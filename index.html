<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Glaze IDE</title>
<style>
body { margin:0; background:#1e1e1e; color:white; font-family:Consolas; }
#toolbar { padding:10px; background:#2a2a2a; }
button { margin-right:10px; padding:5px 10px; }
#editor { width:100%; height:300px; background:#111; color:white; border:none; padding:10px; font-family:Consolas; }
#gameCanvas { display:block; margin:auto; background:black; }
#output { height:150px; overflow:auto; background:#111; padding:10px; }
</style>
</head>
<body>

<div id="toolbar">
    <button id="newBtn">New</button>
    <button id="openBtn">Open</button>
    <button id="saveBtn">Save</button>
    <button id="runBtn">Run (.g1)</button>
    <span id="filePath"></span>
</div>

<textarea id="editor"></textarea>

<canvas id="gameCanvas" width="800" height="400"></canvas>
<div id="output"></div>

<script src="renderer.js"></script>
</body>
</html>
